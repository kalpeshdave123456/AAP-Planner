<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Allocation Planner | Yield-Matching Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0b3d91; --success: #2f855a; --glass: rgba(255, 255, 255, 0.97); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&q=80&w=2000') no-repeat center fixed; background-size: cover; color: #2d3748; }
        .overlay { background: rgba(0, 0, 0, 0.55); min-height: 100vh; padding: 25px; backdrop-filter: blur(6px); }
        .main-content { max-width: 1350px; margin: 0 auto; background: var(--glass); border-radius: 24px; padding: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; margin-bottom: 30px; }
        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; background: #f7fafc; padding: 15px; border-radius: 12px; }
        label { font-size: 0.85rem; font-weight: 700; color: #4a5568; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 20px; }
        button:hover { background: #1a5fb4; transform: scale(1.02); }
        .stat-box { text-align: center; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .gap-alert { background: #fff5f5; border-color: #feb2b2; color: #c53030; }
        .gap-ok { background: #f0fff4; border-color: #9ae6b4; color: #2f855a; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #edf2f7; text-align: left; }
        th { background: #f7fafc; color: #718096; text-transform: uppercase; font-size: 0.7rem; }
        .stress-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin: 2px; background: #e2e8f0; }
        .high { background: #c6f6d5; color: #22543d; }
    </style>
</head>
<body>
<div class="overlay">
    <div class="main-content">
        <h1>Asset Allocation Planner</h1>
        
        <div class="grid">
            <div class="card">
                <h3>⚙️ Portfolio Configuration</h3>
                <label>Current Corpus (₹)</label>
                <input type="number" id="currentVal" value="30000000">
                
                <label style="margin-top:15px; display:block;">Desired Monthly Withdrawal (₹)</label>
                <input type="number" id="income" value="100000">

                <p style="font-weight:bold; margin-top:20px; margin-bottom:5px; font-size:0.85rem;">Expected Annual Returns (%)</p>
                <div class="input-row">
                    <div><label>India Eq</label><input type="number" id="ret_india" value="12"></div>
                    <div><label>US Eq</label><input type="number" id="ret_us" value="10"></div>
                    <div><label>BAF</label><input type="number" id="ret_baf" value="10"></div>
                    <div><label>InvITs</label><input type="number" id="ret_invit" value="9"></div>
                    <div><label>Gold</label><input type="number" id="ret_gold" value="8"></div>
                    <div><label>Debt</label><input type="number" id="ret_debt" value="6.5"></div>
                </div>
                <button onclick="runPlanner()">Generate Comprehensive Plan</button>
            </div>

            <div class="card">
                <h3>📊 Funding Strategy & 4% Rule</h3>
                <div id="gapBox" class="stat-box">
                    <div id="gapStatusText" style="font-weight: bold;">Status</div>
                    <div id="gapAmount" style="font-size: 1.8rem; font-weight: 800;">₹ 0</div>
                    <div id="gapMessage" style="font-size: 0.8rem; margin-top: 5px;">Analyzing...</div>
                </div>
                <h3>Monthly Income Breakdown</h3>
                <table id="incomeTable"></table>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h3>🧩 Asset Allocation & Stress-Test Resilience</h3>
            <table id="allocationTable"></table>
        </div>
    </div>
</div>

<script>
    let chartInstances = {};

    function runPlanner() {
        const currentVal = parseFloat(document.getElementById("currentVal").value);
        const monthlyExp = parseFloat(document.getElementById("income").value);
        const annualExp = monthlyExp * 12;
        const requiredFor4Percent = annualExp / 0.04;
        
        // 1. Gap Analysis
        const gapBox = document.getElementById("gapBox");
        const gapAmtDisplay = document.getElementById("gapAmount");
        const gapMsg = document.getElementById("gapMessage");
        const statusText = document.getElementById("gapStatusText");

        if (currentVal < requiredFor4Percent) {
            const gap = requiredFor4Percent - currentVal;
            gapBox.className = "stat-box gap-alert";
            statusText.innerText = "⚠️ SHORTFALL DETECTED";
            gapAmtDisplay.innerText = "₹ " + (gap / 10000000).toFixed(2) + " Cr Deficit";
            gapMsg.innerText = `Based on the 4% rule, you need ₹${(requiredFor4Percent/10000000).toFixed(2)} Cr for safe withdrawal.`;
        } else {
            gapBox.className = "stat-box gap-ok";
            statusText.innerText = "✅ SUSTAINABLE CORPUS";
            gapAmtDisplay.innerText = "₹ " + ((currentVal - requiredFor4Percent)/10000000).toFixed(2) + " Cr Surplus";
            gapMsg.innerText = "Your portfolio is within the safe 4% withdrawal limit.";
        }

        const userReturns = {
            india: parseFloat(document.getElementById("ret_india").value)/100,
            us: parseFloat(document.getElementById("ret_us").value)/100,
            baf: parseFloat(document.getElementById("ret_baf").value)/100,
            gold: parseFloat(document.getElementById("ret_gold").value)/100,
            invit: parseFloat(document.getElementById("ret_invit").value)/100,
            debt: parseFloat(document.getElementById("ret_debt").value)/100
        };

        const alloc = { baf: 0.20, india: 0.20, us: 0.20, invit: 0.10, debt: 0.20, gold: 0.10 };
        
        updateAllocationTable(alloc, currentVal);
        updateIncomeTable(alloc, currentVal, userReturns, monthlyExp);
    }

    function updateAllocationTable(alloc, total) {
        const data = {
            india: { name: "India Equity", fund: "Parag Parikh Flexi Cap", stress: ["AI Growth", "Long-term compounding"] },
            us: { name: "US Equity", fund: "Motilal Oswal S&P 500 Index", stress: ["Global AI", "USD Hedge"] },
            baf: { name: "Balanced Advantage", fund: "HDFC Balanced Advantage", stress: ["Market Crisis", "Deflation"] },
            invit: { name: "InvITs/REITs", fund: "IndiGrid / PowerGrid InvIT", stress: ["Hyper-Inflation", "UBI Cashflow"] },
            debt: { name: "Debt", fund: "Bharat Bond ETF / Gilt Funds", stress: ["Capital Preservation", "Safety"] },
            gold: { name: "Gold", fund: "Sovereign Gold Bond (SGB)", stress: ["Geopolitical Risk", "Inflation"] }
        };
        
        let html = `<tr><th>Asset Class</th><th>%</th><th>Amount (₹)</th><th>Suggested Top-Rated Fund</th><th>Stress Resilience</th></tr>`;
        for (let key in alloc) {
            let tags = data[key].stress.map(s => `<span class="stress-tag">${s}</span>`).join("");
            html += `<tr>
                <td><b>${data[key].name}</b></td>
                <td>${(alloc[key]*100)}%</td>
                <td>₹${((total * alloc[key])/10000000).toFixed(2)} Cr</td>
                <td style="color:#0b3d91; font-weight:600;">${data[key].fund}</td>
                <td>${tags}</td>
            </tr>`;
        }
        document.getElementById("allocationTable").innerHTML = html;
    }

    function updateIncomeTable(alloc, total, userReturns, monthlyExp) {
        let totalMonthlyGenerated = 0;
        const mapping = { baf: "BAF", india: "India Eq", us: "US Eq", invit: "InvITs", debt: "Debt", gold: "Gold" };
        
        let html = `<tr><th>Asset</th><th>Annual Return (%)</th><th>Yearly Income</th><th>Monthly Contribution</th></tr>`;
        
        for (let key in alloc) {
            const assetValue = total * alloc[key];
            const annualReturn = userReturns[key];
            const yearlyIncome = assetValue * annualReturn;
            const monthlyContribution = yearlyIncome / 12;
            totalMonthlyGenerated += monthlyContribution;

            html += `<tr>
                <td>${mapping[key]}</td>
                <td>${(annualReturn * 100).toFixed(1)}%</td>
                <td>₹${(yearlyIncome / 100000).toFixed(2)} Lakh</td>
                <td>₹${monthlyContribution.toLocaleString('en-IN', {maximumFractionDigits:0})}</td>
            </tr>`;
        }

        const withdrawalAdjustment = monthlyExp / totalMonthlyGenerated;
        
        html += `<tr style="background:#f0f4f8; font-weight:bold;">
            <td colspan="3">Total Portfolio Yield Capacity</td>
            <td>₹${totalMonthlyGenerated.toLocaleString('en-IN', {maximumFractionDigits:0})} /mo</td>
        </tr>`;
        
        document.getElementById("incomeTable").innerHTML = html;
    }

    runPlanner();
</script>
</body>
</html>
