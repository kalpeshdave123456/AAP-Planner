<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Allocation Planner | 4% Rule & Stress-Testing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0b3d91; --success: #2f855a; --warning: #c05621; --glass: rgba(255, 255, 255, 0.97); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&q=80&w=2000') no-repeat center fixed; background-size: cover; color: #2d3748; }
        .overlay { background: rgba(0, 0, 0, 0.55); min-height: 100vh; padding: 25px; backdrop-filter: blur(6px); }
        .main-content { max-width: 1300px; margin: 0 auto; background: var(--glass); border-radius: 24px; padding: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; margin-bottom: 30px; }
        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; background: #f7fafc; padding: 15px; border-radius: 12px; }
        label { font-size: 0.85rem; font-weight: 700; color: #4a5568; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 20px; }
        button:hover { background: #1a5fb4; transform: scale(1.02); }
        .stat-box { text-align: center; padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .stat-val { font-size: 1.8rem; font-weight: 800; }
        .gap-alert { background: #fff5f5; border-color: #feb2b2; color: #c53030; }
        .gap-ok { background: #f0fff4; border-color: #9ae6b4; color: #2f855a; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid #edf2f7; text-align: left; }
        th { background: #f7fafc; color: #718096; text-transform: uppercase; font-size: 0.7rem; }
        .stress-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin: 2px; }
        .high { background: #c6f6d5; color: #22543d; } /* Resilient */
        .med { background: #feebc8; color: #744210; } /* Moderate */
    </style>
</head>
<body>
<div class="overlay">
    <div class="main-content">
        <h1>Asset Allocation Planner</h1>
        
        <div class="grid">
            <div class="card">
                <h3>⚙️ Portfolio Parameters</h3>
                <label>Current Corpus (₹)</label>
                <input type="number" id="currentVal" value="30000000">
                
                <label style="margin-top:15px; display:block;">Desired Monthly Withdrawal (₹)</label>
                <input type="number" id="income" value="100000">

                <p style="font-weight:bold; margin-top:20px; margin-bottom:5px; font-size:0.85rem;">Expected Annual Returns (%)</p>
                <div class="input-row">
                    <div><label>India Eq</label><input type="number" id="ret_india" value="12"></div>
                    <div><label>US Eq</label><input type="number" id="ret_us" value="10"></div>
                    <div><label>BAF</label><input type="number" id="ret_baf" value="10"></div>
                    <div><label>InvITs</label><input type="number" id="ret_invit" value="9"></div>
                    <div><label>Gold</label><input type="number" id="ret_gold" value="8"></div>
                    <div><label>Debt</label><input type="number" id="ret_debt" value="6.5"></div>
                </div>

                <button onclick="runPlanner()">Analyze & Stress Test</button>
            </div>

            <div class="card">
                <h3>📉 4% Rule Gap Analysis</h3>
                <div id="gapBox" class="stat-box">
                    <div id="gapStatusText" style="font-weight: bold;">Status</div>
                    <div class="stat-val" id="gapAmount">₹ 0</div>
                    <div id="gapMessage" style="font-size: 0.85rem; margin-top: 5px;">Calculation...</div>
                </div>
                <div class="stat-box" style="background: #f0f7ff; color: #2c5282;">
                    <div>Success Probability (Monte Carlo)</div>
                    <div id="successProb" style="font-size: 2.2rem; font-weight: 900;">--%</div>
                </div>
                <canvas id="pieChart" height="150"></canvas>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h3>🧩 Asset Allocation & Stress-Test Resilience</h3>
            <table id="allocationTable"></table>
        </div>

        <div class="grid">
            <div class="card">
                <h3>🏆 Best Rated Funds (2026)</h3>
                <div id="fundList" style="font-size: 0.9rem; line-height: 1.6;"></div>
            </div>
            <div class="card">
                <h3>📈 30-Year Median Projection (Cr)</h3>
                <canvas id="growthChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstances = {};

    function runPlanner() {
        const currentVal = parseFloat(document.getElementById("currentVal").value);
        const monthlyExp = parseFloat(document.getElementById("income").value);
        const annualExp = monthlyExp * 12;
        const requiredFor4Percent = annualExp / 0.04;
        
        // Gap Analysis
        const gapBox = document.getElementById("gapBox");
        const gapAmtDisplay = document.getElementById("gapAmount");
        const gapMsg = document.getElementById("gapMessage");
        const statusText = document.getElementById("gapStatusText");

        if (currentVal < requiredFor4Percent) {
            const gap = requiredFor4Percent - currentVal;
            gapBox.className = "stat-box gap-alert";
            statusText.innerText = "⚠️ CORPUS SHORTFALL";
            gapAmtDisplay.innerText = "₹ " + (gap / 10000000).toFixed(2) + " Cr More Needed";
            gapMsg.innerText = `Based on the 4% rule, you need ₹${(requiredFor4Percent/10000000).toFixed(2)} Cr to safely withdraw ₹${monthlyExp.toLocaleString()} /mo indefinitely.`;
        } else {
            gapBox.className = "stat-box gap-ok";
            statusText.innerText = "✅ CORPUS SUFFICIENT";
            gapAmtDisplay.innerText = "Surplus: ₹ " + ((currentVal - requiredFor4Percent)/10000000).toFixed(2) + " Cr";
            gapMsg.innerText = "Your corpus exceeds the 4% safety threshold.";
        }

        const userReturns = {
            india: parseFloat(document.getElementById("ret_india").value)/100,
            us: parseFloat(document.getElementById("ret_us").value)/100,
            baf: parseFloat(document.getElementById("ret_baf").value)/100,
            gold: parseFloat(document.getElementById("ret_gold").value)/100,
            invit: parseFloat(document.getElementById("ret_invit").value)/100,
            debt: parseFloat(document.getElementById("ret_debt").value)/100
        };

        const alloc = { baf: 0.20, india: 0.20, us: 0.20, invit: 0.10, debt: 0.20, gold: 0.10 };
        updateTable(alloc, currentVal);
        renderPie(alloc);
        updateFunds();
        
        const mcSuccess = runMonteCarlo(currentVal, 30, alloc, annualExp, 0.06, userReturns);
        document.getElementById("successProb").innerText = mcSuccess + "%";
        updateGrowthChart(currentVal, 30, alloc, annualExp, 0.06, userReturns);
    }

    function updateTable(alloc, total) {
        const data = {
            india: { name: "India Equity", stress: ["AI Growth: HIGH", "Deflation: MED", "Crisis: LOW"] },
            us: { name: "US Equity", stress: ["AI Growth: HIGH", "Hyper-Inflation: MED"] },
            baf: { name: "Balanced Advantage", stress: ["Crisis: HIGH", "Deflation: HIGH"] },
            invit: { name: "InvITs/REITs", stress: ["UBI: HIGH", "Hyper-Inflation: HIGH"] },
            debt: { name: "Debt", stress: ["Deflation: HIGH", "Crisis: MED"] },
            gold: { name: "Gold", stress: ["Hyper-Inflation: HIGH", "Crisis: HIGH"] }
        };
        
        let html = `<tr><th>Asset Class</th><th>Allocation</th><th>Stress-Test Resilience (Top Scenarios)</th></tr>`;
        for (let key in alloc) {
            let tags = data[key].stress.map(s => {
                let cls = s.includes("HIGH") ? "high" : "med";
                return `<span class="stress-tag ${cls}">${s}</span>`;
            }).join("");
            
            html += `<tr>
                <td><b>${data[key].name}</b></td>
                <td>₹${((total * alloc[key])/10000000).toFixed(2)} Cr (${(alloc[key]*100)}%)</td>
                <td>${tags}</td>
            </tr>`;
        }
        document.getElementById("allocationTable").innerHTML = html;
    }

    function updateFunds() {
        document.getElementById("fundList").innerHTML = `
            <p><b>🇮🇳 India Equity:</b> Parag Parikh Flexi Cap, ICICI Pru Nifty 50 Index</p>
            <p><b>⚖️ BAF:</b> HDFC Balanced Advantage, SBI Balanced Advantage</p>
            <p><b>🏗 InvIT:</b> PowerGrid InvIT, IndiGrid Trust (Yield ~9-10%)</p>
            <p><b>🥇 Gold:</b> Sovereign Gold Bonds (SGB), Nippon India Gold ETF</p>
            <p><b>🏦 Debt:</b> Bharat Bond ETF, HDFC Corporate Bond Fund</p>
            <p><b>🇺🇸 US Equity:</b> Motilal Oswal S&P 500, Navi US Total Market</p>
        `;
    }

    function renderPie(alloc) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(chartInstances.pie) chartInstances.pie.destroy();
        chartInstances.pie = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['BAF', 'India', 'US', 'InvIT', 'Debt', 'Gold'],
                datasets: [{ data: Object.values(alloc), backgroundColor: ['#4299e1', '#0b3d91', '#2c5282', '#48bb78', '#cbd5e0', '#ecc94b'] }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '75%' }
        });
    }

    function runMonteCarlo(start, years, alloc, annualExpense, inflation, userReturns) {
        const iterations = 1000;
        const vol = { baf: 0.10, india: 0.18, us: 0.16, invit: 0.08, debt: 0.04, gold: 0.15 };
        let successes = 0;

        for (let i = 0; i < iterations; i++) {
            let balance = start;
            let withdrawal = annualExpense;
            let failed = false;
            for (let y = 0; y < years; y++) {
                let yrReturn = 0;
                for (let key in alloc) yrReturn += alloc[key] * (userReturns[key] + (randn() * vol[key]));
                balance = (balance - withdrawal) * (1 + yrReturn);
                withdrawal *= (1 + inflation);
                if (balance <= 0) { failed = true; break; }
            }
            if (!failed) successes++;
        }
        return ((successes / iterations) * 100).toFixed(1);
    }

    function updateGrowthChart(start, years, alloc, annualExpense, inflation, userReturns) {
        const ctx = document.getElementById('growthChart').getContext('2d');
        let labels = ['Start'], values = [start];
        let avgR = 0;
        for(let k in alloc) avgR += alloc[k] * userReturns[k];

        let balance = start;
        let withdrawal = annualExpense;
        for(let i=1; i<=years; i++) {
            labels.push("Y" + i);
            balance = (balance - withdrawal) * (1 + avgR);
            withdrawal *= (1 + inflation);
            values.push(balance > 0 ? balance : 0);
        }
        
        if(chartInstances.growth) chartInstances.growth.destroy();
        chartInstances.growth = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Median Growth (Cr)', data: values.map(v => v/10000000), borderColor: '#2f855a', fill: true, backgroundColor: 'rgba(47, 133, 90, 0.1)' }] }
        });
    }

    function randn() {
        let u = 0, v = 0;
        while(u === 0) u = Math.random();
        while(v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    runPlanner();
</script>
</body>
</html>
