<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Global FIRE Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0b3d91;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            /* Using the uploaded image as the background */
            background-image: url('image_bcae3a.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--glass);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }

        .chart-container {
            height: 300px; /* Fixed height to prevent jumping */
            position: relative;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #bbb; text-align: left; }
    </style>
</head>

<body>

<div class="main-wrapper">
    <h1>Advanced Global FIRE Planner</h1>

    <div class="container">
        <div class="card">
            <h3>Inputs</h3>
            Monthly Income Goal (₹) <input id="income" value="100000"><br>
            Years <input id="years" value="30"><br>
            Equity Return % <input id="eq" value="11"><br>
            Debt Return % <input id="debt" value="6.5"><br>
            Gold Return % <input id="gold" value="5"><br>
            INVIT Yield % <input id="invit" value="8"><br>
            Risk Profile:
            <select id="risk">
                <option value="conservative">Conservative</option>
                <option value="balanced" selected>Balanced</option>
                <option value="aggressive">Aggressive</option>
            </select>
            <br><br>
            <button onclick="runPlanner()">Run Planner</button>
        </div>

        <div class="card">
            <h3>Required Portfolio</h3>
            <div id="portfolioNeeded">--</div>
            <h3>Asset Allocation</h3>
            <table id="allocationTable"></table>
        </div>
    </div>

    <div class="card">
        <h3>Portfolio Growth Projection</h3>
        <div class="chart-container"><canvas id="growthChart"></canvas></div>
    </div>

    <div class="card">
        <h3>Monte Carlo Simulation</h3>
        <div class="chart-container"><canvas id="mcChart"></canvas></div>
    </div>
</div>

<script>
    // Variables to store chart instances for proper destruction
    let growthChart, mcChart;

    function getAllocation(risk){
        if(risk=="conservative") return {india:0.25,us:0.20,debt:0.35,gold:0.10,invit:0.10}
        if(risk=="balanced") return {india:0.35,us:0.25,debt:0.20,gold:0.10,invit:0.10}
        return {india:0.40,us:0.30,debt:0.10,gold:0.10,invit:0.10}
    }

    function runPlanner(){
        let income = parseFloat(document.getElementById("income").value);
        let years = parseInt(document.getElementById("years").value);
        let eq = parseFloat(document.getElementById("eq").value)/100;
        let debt = parseFloat(document.getElementById("debt").value)/100;
        let gold = parseFloat(document.getElementById("gold").value)/100;
        let invit = parseFloat(document.getElementById("invit").value)/100;
        let risk = document.getElementById("risk").value;
        let alloc = getAllocation(risk);
        let requiredPortfolio = (income * 12) / 0.04;

        document.getElementById("portfolioNeeded").innerHTML = 
            "<b>₹"+requiredPortfolio.toLocaleString()+"</b> required.";

        let table = "<tr><th>Asset</th><th>%</th><th>Amount</th></tr>" +
            row("India Equity",alloc.india,requiredPortfolio) +
            row("US Equity",alloc.us,requiredPortfolio) +
            row("Debt",alloc.debt,requiredPortfolio) +
            row("Gold",alloc.gold,requiredPortfolio) +
            row("INVIT",alloc.invit,requiredPortfolio);
        document.getElementById("allocationTable").innerHTML = table;

        runGrowth(requiredPortfolio, years, alloc, eq, debt, gold, invit);
        drawMC(runMonteCarlo(requiredPortfolio, years, alloc, eq, debt, gold, invit));
    }

    function row(name, pct, total){
        return "<tr><td>"+name+"</td><td>"+(pct*100)+"%</td><td>₹"+(total*pct).toLocaleString()+"</td></tr>";
    }

    function runGrowth(start, years, alloc, eq, debt, gold, invit){
        let labels = [], data = [], value = start;
        for(let i=0; i<=years; i++){
            labels.push(i);
            data.push(value);
            value *= (1 + (alloc.india*eq + alloc.us*eq + alloc.debt*debt + alloc.gold*gold + alloc.invit*invit));
        }
        if(growthChart) growthChart.destroy();
        growthChart = new Chart(document.getElementById("growthChart"), {
            type: "line",
            data: { labels: labels, datasets: [{ label: "Portfolio Value", data: data, borderColor: "#0b3d91" }] },
            options: { maintainAspectRatio: false }
        });
    }

    function runMonteCarlo(start, years, alloc, eq, debt, gold, invit){
        let runs = 500, results = [];
        for(let r=0; r<runs; r++){
            let value = start;
            for(let y=0; y<years; y++){
                let total = alloc.india*randn(eq,0.18) + alloc.us*randn(eq,0.18) + alloc.debt*randn(debt,0.05) + alloc.gold*randn(gold,0.12) + alloc.invit*randn(invit,0.05);
                value *= (1 + total);
            }
            results.push(value);
        }
        return results;
    }

    function randn(mean, sd){
        return mean + (Math.sqrt(-2*Math.log(Math.random())) * Math.cos(2*Math.PI*Math.random())) * sd;
    }

    function drawMC(data){
        data.sort((a,b)=>a-b);
        if(mcChart) mcChart.destroy();
        mcChart = new Chart(document.getElementById("mcChart"), {
            type: "bar",
            data: { labels: data.map((_,i)=>i), datasets: [{ label: "Ending Portfolio Value", data: data, backgroundColor: "#0b3d91" }] },
            options: { maintainAspectRatio: false, scales: { x: { display: false } } }
        });
    }

    runPlanner();
</script>

</body>
</html>
